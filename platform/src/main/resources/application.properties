# --- Base Application Configuration ---
spring.application.name=platform
# Import .env file
spring.config.import=optional:file:.env[.properties]
# --- Database Configuration (MariaDB) ---
spring.datasource.url=jdbc:mariadb://localhost:3306/ctf_platform
spring.datasource.username=root
# Password injected via environment variables for security
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# --- JPA / Hibernate Default Settings ---
# Database dialect for MariaDB optimization
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# --- Security & JWT ---
# Secret key injected via environment variables
jwt.secret=${JWT_SECRET}
# JWT expiration time in milliseconds (86400000 = 24 hours)
jwt.expiration-ms=86400000

# --- Logging Configuration (LOW-02 Mitigation) ---
# Safe default logging level. Prevents JWT payload and security context leakage.
logging.level.com.ctf.platform=INFO

# --- Active Profile ---
# Default profile set to 'dev' for local development.
# In production, run the jar with: --spring.profiles.active=prod
spring.profiles.active=dev